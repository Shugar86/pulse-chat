version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pulsechat}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  wireguard:
    image: ghcr.io/wg-easy/wg-easy
    container_name: pulsechat-wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    environment:
      LANG: en
      WG_HOST: ${WG_HOST:-vpn.localhost}
      PASSWORD: ${WG_PASSWORD:-changeme}
      WG_PORT: ${WG_PORT:-51820}
      WG_DEFAULT_DNS: ${WG_DNS:-1.1.1.1}
      WG_ALLOWED_IPS: ${WG_ALLOWED_IPS:-0.0.0.0/0, ::/0}
      WG_PERSISTENT_KEEPALIVE: 25
    ports:
      - '${WG_PORT:-51820}:51820/udp'
      - '51821:51821/tcp'
    volumes:
      - wireguard_data:/etc/wireguard
      - ${WG_SYNC_DIR:-./.wg-sync}:/sync:ro
    restart: unless-stopped

volumes:
  postgres_data:
  wireguard_data:
